<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="RETE — an XR design collective creating immersive experiences at the intersection of research, space, and emerging technology." />
  <title>RETE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aboreto&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-home">
  <div class="home-stage" id="home" aria-label="RETE">
    <div class="home-base" aria-hidden="true"></div>

    <div class="home-media home-media--primary is-active" aria-hidden="true">
      <video
        class="home-video"
        id="video-primary"
        src="assets/gradient.mp4"
        muted
        playsinline
        webkit-playsinline
        preload="auto"
        autoplay
      ></video>
    </div>

    <div class="home-media home-media--scroll" id="scroll-media" aria-hidden="true">
      <video
        class="home-video"
        id="video-scroll"
        src="assets/scroll.mp4"
        muted
        playsinline
        webkit-playsinline
        preload="auto"
      ></video>
    </div>

    <a href="about.html" class="about-nav" id="about-nav">ABOUT US</a>
    <h1 class="logo logo--hero" id="hero-logo">
      <img src="assets/logo.png" alt="RETE" width="349" height="145" />
    </h1>
  </div>

  <div class="home-scroll" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
